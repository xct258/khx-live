# 是否启用上传备份脚本中投稿视频（true/false）
ENABLE_VIDEO_UPLOAD=false
# 是否启用上传备份脚本中 rclone 网盘备份（true/false）
ENABLE_RCLONE_UPLOAD=false
# 是否启用自动清理旧视频（true/false），超过保留天数的视频将被删除
ENABLE_CLEANUP=false
# 视频保留天数
RETENTION_DAYS=3
# 是否从原始视频中提取音频（true/false）
ENABLE_AUDIO_EXTRACT=false
# 是否提交音频到语音识别后端（true/false）
# 注意：开启此选项后，无论 ENABLE_AUDIO_EXTRACT 是否开启，都会从原始视频中提取音频
ENABLE_ASR_SUBMIT=false
# 语音识别远程路径映射，将本地路径前缀替换为远程 Windows 网络路径或者linux路径，便于语音识别后端访问视频文件
# linux不需要映射，直接使用原始路径即可
# Windows网络路径示例（注意！必须使用单引号）：/rec/videos -> '\\\\TRUENAS\\ssd-1\\khx-live\\videos'
ASR_PATH_TYPE="linux" # 可选值：windows、linux
ASR_SERVER="127.0.0.1" # 语音识别后端服务器地址
ASR_PORT="8286" # 语音识别后端服务器端口
# linux下此参数无效，Windows下此参数为远程路径映射的前缀
ASR_REMOTE_PATH='\\\\TRUENAS\\ssd-1\\khx-live\\videos'

# 设置视频源文件夹路径，会处理设置目录中的的文件夹里的视频，不会处理设置目录中的视频
source_folders=(
  "/rec/biliup/video"
  "/rec/录播姬/video"
  # 可以继续添加其它目录
)
# 上传用的 cookies 文件路径
biliup_up_cookies="/rec/cookies/bilibili/cookies-烦心事远离.json"
# 录播姬同步用的 cookie JSON 文件路径
record_cookie_json="/rec/cookies/bilibili/cookies-xct258-2.json"
# DanmakuFactory转换xml文件为ass文件时的透明度（1-255，255为不透明）
DanmakuFactory_opacity=155
