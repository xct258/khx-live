# 是否执行上传备份脚本（true/false）
ENABLE_UPLOAD_SCRIPT=true
# 是否启用在线切片功能（true/false）
ENABLE_WEBCLIP=false # 修改后需要重启容器以生效，会自动开始安装相关依赖
# 是否启用语音识别功能（true/false），开启之前请先准备模型文件，脚本默认使用large-v3-turbo模型，请下载后放入语音识别/models文件夹中
ENABLE_OPENCC=false # 修改后需要重启容器以生效，会自动开始安装相关依赖
# 是否安装intel核显驱动（true/false），若容器运行在intel核显的主机上，建议开启此选项以提高视频压制性能
ENABLE_INTEL_GPU=false # 修改后需要重启容器以生效，会自动开始安装相关依赖

# ===============================
# 以下配置仅在启用在线切片功能时才生效
# ===============================
# 在线切片服务监听的端口
WEBCLIP_PORT=8186

# ===============================
# 以下配置仅在执行上传备份脚本时才生效
# ===============================
# 服务器名称
server_name="pve-1-debian-1"
# 需要监控的录制平台。录播姬或者biliup，可以为多个
update_servers=(
  #"biliup"
  "录播姬"
)
# 是否启用上传备份脚本中视频压制（true/false）
ENABLE_DANMAKU_OVERLAY=false
# 是否将 FLV 文件转换为 mp4 格式（true/false），若关闭则后续仍使用原 flv 文件
# 注意！，如果不转换为mp4不能进行弹幕压制，开启视频压制此选项无效，必定会转换
CONVERT_FLV_TO_MP4=false
# 视频与弹幕之间允许的最大时间差（单位：秒），超过此时间差的视频将不会进行弹幕压制
MAX_DIFF_LIMIT=15

# 上传简介模板，可使用占位符 {title}、{platform}、{danmaku_count}、{cover_time}、{cover_p} 表示直播标题、录制平台、弹幕总数、封面时间节点和所在分P
# 其余内容为固定文本，支持多行
UPLOAD_DESC_TEMPLATE='↑↑↑直播间地址↑↑↑
录制平台：{platform}
弹幕总数：{danmaku_count}
封面时间：{cover_p}P {cover_time}

